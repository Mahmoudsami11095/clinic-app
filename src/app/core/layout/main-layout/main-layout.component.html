@if (authService.currentUser()) {
<div class="flex h-screen bg-slate-50 dark:bg-slate-950 text-slate-800 dark:text-slate-100 overflow-hidden font-sans selection:bg-indigo-500/30 transition-colors duration-300">
  
  <!-- Mobile Sidebar Overlay Backdrop -->
  @if (layoutService.isSidebarOpen()) {
    <div class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-30 md:hidden" 
         (click)="layoutService.closeSidebar()"></div>
  }

  <!-- Sidebar -->
  <app-sidebar 
    class="flex-shrink-0 z-40 fixed md:static inset-y-0 start-0 transform transition-transform duration-300 ease-in-out md:transform-none shadow-2xl md:shadow-none"
    [class]="layoutService.isSidebarOpen() ? 'translate-x-0' : '-translate-x-full md:translate-x-0'">
  </app-sidebar>
  
  <div class="flex-1 flex flex-col min-w-0 relative">
    
    <!-- Header -->
    <app-header></app-header>
    
    <!-- Main Content Area -->
    <main class="flex-1 overflow-x-hidden overflow-y-auto bg-slate-50 dark:bg-slate-950 relative">
      <!-- Ambient Background Gradients -->
      <div class="absolute top-0 start-1/4 w-96 h-96 bg-indigo-400/10 rounded-full blur-[120px] -z-10 pointer-events-none"></div>
      <div class="absolute bottom-0 end-1/4 w-96 h-96 bg-purple-400/10 rounded-full blur-[120px] -z-10 pointer-events-none"></div>

      <!-- Page Content Container -->
      <div class="p-6 md:p-8 lg:p-10 max-w-7xl mx-auto min-h-full">
        <router-outlet></router-outlet>
      </div>
    </main>

  </div>
</div>
}
