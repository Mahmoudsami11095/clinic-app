<aside class="w-64 h-screen bg-slate-900 text-slate-300 flex flex-col shadow-2xl transition-all duration-300 border-r border-slate-800 relative z-20">
  
  <!-- Logo Area -->
  <div class="h-20 flex items-center justify-center border-b border-slate-800/60 sticky top-0 bg-slate-900/95 backdrop-blur-sm z-10 w-full px-6">
    <div class="flex items-center gap-3 w-full">
      <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center shadow-lg shadow-indigo-500/20">
        <!-- Medical Cross SVG -->
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-white"><path d="M12 2v20"/><path d="M2 12h20"/></svg>
      </div>
      <span class="font-bold text-xl tracking-tight text-white">MedClinic</span>
    </div>
  </div>

  <!-- Navigation Links -->
  <nav class="flex-1 overflow-y-auto py-6 px-4 flex flex-col gap-2 sidebar-scroll">
    @for (item of menuItems; track item.route) {
      <a [routerLink]="item.route" 
         routerLinkActive="bg-indigo-600/10 text-indigo-400 border-indigo-500/50" 
         [routerLinkActiveOptions]="{exact: false}"
         class="flex items-center gap-4 px-4 py-3 rounded-xl transition-all duration-200 hover:bg-slate-800/80 hover:text-white group border border-transparent">
        
        <i [class]="'text-lg transition-transform duration-300 group-hover:scale-110 ' + item.icon"></i>
        
        <span class="font-medium font-sans text-sm tracking-wide">{{ item.label }}</span>
        
        <div class="ml-auto w-1.5 h-1.5 rounded-full bg-indigo-500 opacity-0 transition-opacity duration-300" 
             [class.opacity-100]="false"></div> 
      </a>
    }
  </nav>

  <!-- Bottom Profile / Settings Area -->
  <div class="p-4 border-t border-slate-800/60 mt-auto">
    <button class="flex items-center gap-3 w-full p-3 rounded-xl hover:bg-slate-800/80 transition-colors">
      <div class="w-10 h-10 rounded-full bg-slate-700 overflow-hidden border-2 border-slate-600 flex items-center justify-center">
        <i class="pi pi-user text-slate-400"></i>
      </div>
      <div class="flex flex-col text-left">
        <span class="text-sm font-semibold text-slate-200">Admin User</span>
        <span class="text-xs text-slate-500">Clinic Manager</span>
      </div>
    </button>
  </div>
</aside>
