<header class="h-20 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border-b border-slate-200/60 dark:border-slate-700/60 sticky top-0 z-10 w-full flex items-center justify-between px-8 shadow-sm dark:shadow-slate-900/50">
  @if (authService.currentUser(); as user) {
    <!-- Search Bar -->
    <div class="relative w-96 hidden md:block group">
      <i class="pi pi-search absolute start-4 top-1/2 -translate-y-1/2 text-slate-400 dark:text-slate-500 group-focus-within:text-indigo-500 transition-colors"></i>
      <input type="text" [placeholder]="'common.search' | translate" 
             class="w-full bg-slate-50/50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-full py-2.5 ps-12 pe-4 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500/50 transition-all text-slate-700 dark:text-slate-200 placeholder-slate-400 dark:placeholder-slate-500">
    </div>

    <!-- Right Actions -->
    <div class="flex items-center gap-4 ms-auto relative">
      
      <!-- Clinic Selector -->
      <div class="flex items-center gap-2 me-2">
        <i class="pi pi-building text-slate-400 dark:text-slate-500 text-sm"></i>
        <span class="text-xs font-semibold text-slate-500 dark:text-slate-400 hidden md:inline">{{ 'common.clinic' | translate }}:</span>
        <div *ngIf="clinicService.canSwitchClinics(); else singleClinicLabel">
          <select [value]="clinicService.activeClinicId()" 
                  (change)="onClinicChange($event)"
                  class="bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl px-3 py-1.5 text-xs font-semibold text-slate-700 dark:text-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500/50 transition-all cursor-pointer">
            <option *ngIf="user.role === 'admin' || authService.isDoctor()" value="all">{{ 'common.all_clinics' | translate }}</option>
            <option *ngFor="let clinic of clinicService.allowedClinics()" [value]="clinic.id">
              {{ clinic.name }}
            </option>
          </select>
        </div>
        <ng-template #singleClinicLabel>
          <span class="px-3 py-1.5 text-xs font-semibold rounded-xl bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-slate-200 ring-1 ring-slate-200/50 dark:ring-slate-700/50">
            {{ clinicService.activeClinicName() }}
          </span>
        </ng-template>
      </div>

      <!-- Active User Role Badge -->
      <span class="hidden sm:inline-flex items-center gap-1.5 px-3 py-1 text-xs font-semibold rounded-full bg-indigo-50 dark:bg-indigo-500/10 text-indigo-600 dark:text-indigo-400 ring-1 ring-indigo-500/10 capitalize">
        <span class="w-1.5 h-1.5 rounded-full bg-indigo-500"></span>
        {{ 'common.role' | translate }}: {{ user.role }}
      </span>

      <!-- Theme Toggle Button -->
      <button (click)="themeService.toggle()" 
              [title]="'theme.toggle' | translate"
              class="relative p-2.5 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-500 dark:text-slate-400 hover:text-slate-700 dark:hover:text-slate-200 transition-all focus:outline-none cursor-pointer group">
        <!-- Sun icon (shown in dark mode → click to go light) -->
        <i class="pi pi-sun text-xl hidden dark:block transition-transform group-hover:rotate-45"></i>
        <!-- Moon icon (shown in light mode → click to go dark) -->
        <i class="pi pi-moon text-xl block dark:hidden transition-transform group-hover:-rotate-12"></i>
      </button>

      <!-- Language Switcher Button -->
      <button (click)="languageService.setLanguage(languageService.currentLang() === 'en' ? 'ar' : 'en')" 
              class="relative inline-flex items-center gap-1.5 px-3.5 py-2 rounded-xl text-xs font-bold bg-indigo-50 dark:bg-indigo-500/10 hover:bg-indigo-100 dark:hover:bg-indigo-500/20 text-indigo-700 dark:text-indigo-400 transition-all border border-indigo-200/50 dark:border-indigo-500/20 shadow-sm cursor-pointer">
        <i class="pi pi-globe text-[11px]"></i>
        <span>{{ languageService.currentLang() === 'en' ? 'العربية' : 'English' }}</span>
      </button>

      <!-- Notifications -->
      <div class="relative">
        <button (click)="toggleNotifications()" class="relative p-2.5 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-500 dark:text-slate-400 hover:text-slate-700 dark:hover:text-slate-200 transition-colors focus:outline-none cursor-pointer">
          <i class="pi pi-bell text-xl"></i>
          <span *ngIf="notificationService.unreadCount() > 0" class="absolute top-1 end-1.5 min-w-[16px] h-[16px] px-1 text-[10px] font-bold text-white bg-rose-500 rounded-full ring-2 ring-white dark:ring-slate-900 flex items-center justify-center">
            {{ notificationService.unreadCount() > 99 ? '99+' : notificationService.unreadCount() }}
          </span>
        </button>

        <!-- Notifications Dropdown -->
        <div *ngIf="isNotificationsOpen()" class="absolute end-0 top-12 w-80 rounded-2xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 shadow-xl dark:shadow-slate-900/50 ring-1 ring-black/5 dark:ring-white/5 z-50 animate-in fade-in slide-in-from-top-2 duration-200 overflow-hidden">
          <div class="flex items-center justify-between px-4 py-3 border-b border-slate-100 dark:border-slate-700 bg-slate-50/50 dark:bg-slate-800/50">
            <h3 class="text-sm font-bold text-slate-700 dark:text-slate-200">Notifications</h3>
            <button *ngIf="notificationService.unreadCount() > 0" (click)="notificationService.markAllAsRead()" class="text-xs font-semibold text-indigo-600 hover:text-indigo-700 dark:text-indigo-400 dark:hover:text-indigo-300">
              Mark all as read
            </button>
          </div>
          
          <div class="max-h-80 overflow-y-auto">
            <div *ngIf="notificationService.notifications().length === 0" class="px-4 py-8 text-center text-sm text-slate-500 dark:text-slate-400">
              No notifications yet.
            </div>
            
            <button *ngFor="let notif of notificationService.notifications()" 
                    (click)="notificationService.markAsRead(notif.id)"
                    [class.bg-indigo-50]="!notif.isRead"
                    [class.dark:bg-indigo-900]="!notif.isRead"
                    class="w-full text-start px-4 py-3 border-b border-slate-100 dark:border-slate-700/50 hover:bg-slate-50 dark:hover:bg-slate-700/30 transition-colors last:border-0 relative">
              <div *ngIf="!notif.isRead" class="absolute start-1.5 top-1/2 -translate-y-1/2 w-1.5 h-1.5 rounded-full bg-indigo-500"></div>
              <div class="flex items-start gap-3" [class.ps-3]="!notif.isRead">
                <div class="mt-0.5">
                  <i class="pi pi-calendar text-indigo-500" *ngIf="notif.type === 'Appointment'"></i>
                  <i class="pi pi-dollar text-emerald-500" *ngIf="notif.type === 'Billing'"></i>
                  <i class="pi pi-info-circle text-sky-500" *ngIf="notif.type !== 'Appointment' && notif.type !== 'Billing'"></i>
                </div>
                <div class="flex-1 min-w-0">
                  <p class="text-xs font-bold text-slate-700 dark:text-slate-200 truncate">{{ notif.title }}</p>
                  <p class="text-xs text-slate-500 dark:text-slate-400 mt-0.5 line-clamp-2">{{ notif.message }}</p>
                  <p class="text-[10px] text-slate-400 dark:text-slate-500 mt-1 font-medium">{{ notif.createdAt | date:'short' }}</p>
                </div>
              </div>
            </button>
          </div>
        </div>
      </div>

      <!-- Messages (Hidden until future implementation) -->
      <!-- <button class="p-2.5 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-500 dark:text-slate-400 hover:text-slate-700 dark:hover:text-slate-200 transition-colors focus:outline-none cursor-not-allowed opacity-50">
        <i class="pi pi-envelope text-xl"></i>
      </button> -->

      <div class="h-8 w-px bg-slate-200 dark:bg-slate-700 mx-2 hidden sm:block"></div>
      
      <!-- Profile Dropdown (Active User) -->
      <div class="relative">
        <button (click)="toggleDropdown()" 
                class="flex items-center gap-3 hover:bg-slate-50 dark:hover:bg-slate-800 p-1.5 pe-3 rounded-full transition-colors border border-transparent hover:border-slate-200 dark:hover:border-slate-700 focus:outline-none cursor-pointer">
          <div class="w-9 h-9 rounded-full bg-gradient-to-tr from-indigo-500 to-purple-500 text-white flex items-center justify-center font-bold text-sm shadow-md">
            {{ getAvatarInitials(user.name) }}
          </div>
          <div class="hidden sm:flex flex-col text-start">
            <span class="text-sm font-semibold text-slate-700 dark:text-slate-200 leading-tight">{{ user.name }}</span>
            <span class="text-[10px] text-slate-400 dark:text-slate-500 font-medium capitalize">{{ user.title }}</span>
          </div>
          <i class="pi pi-angle-down text-slate-400 dark:text-slate-500 text-sm ms-1 hidden sm:block"></i>
        </button>

        <!-- Profile Dropdown Menu -->
        <div *ngIf="isDropdownOpen()" 
             class="absolute end-0 top-12 w-56 rounded-2xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 p-2 shadow-xl dark:shadow-slate-900/50 ring-1 ring-black/5 dark:ring-white/5 z-50 animate-in fade-in slide-in-from-top-2 duration-200">
          <div class="px-3 py-2.5 border-b border-slate-100 dark:border-slate-700">
            <p class="text-xs text-slate-400 dark:text-slate-500 font-semibold">{{ 'common.logged_in_as' | translate }}</p>
            <p class="text-sm font-bold text-slate-700 dark:text-slate-200 truncate mt-0.5">{{ user.email }}</p>
          </div>
          <div class="py-1 space-y-1">
            <button (click)="navigateToProfile()" 
                    class="w-full flex items-center gap-2.5 px-3 py-2 text-sm text-slate-700 dark:text-slate-200 hover:bg-slate-50 dark:hover:bg-slate-700/50 transition-colors text-start rounded-xl font-semibold cursor-pointer">
              <i class="pi pi-user text-xs"></i>
              {{ 'sidebar.profile' | translate }}
            </button>
            <button (click)="authService.logout()" 
                    class="w-full flex items-center gap-2.5 px-3 py-2 text-sm text-rose-600 dark:text-rose-400 hover:bg-rose-50 dark:hover:bg-rose-500/10 hover:text-rose-700 dark:hover:text-rose-300 transition-colors text-start rounded-xl font-semibold cursor-pointer">
              <i class="pi pi-power-off text-xs"></i>
              {{ 'common.sign_out' | translate }}
            </button>
          </div>
        </div>
      </div>

    </div>
  }
</header>
