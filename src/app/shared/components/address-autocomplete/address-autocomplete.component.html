<div class="relative text-start">
  <label *ngIf="label" class="block text-sm font-semibold text-slate-700 dark:text-slate-350 mb-1.5">
    {{ label | translate }}
    <span *ngIf="required" class="text-rose-500">*</span>
  </label>

  <div class="relative">
    <i class="pi pi-map-marker absolute start-3.5 top-1/2 -translate-y-1/2 text-slate-400 dark:text-slate-500 text-sm z-10"></i>
    
    <input
      type="text"
      [formControl]="searchControl"
      [placeholder]="placeholder | translate"
      (input)="onInput()"
      (blur)="hideDropdown()"
      (focus)="searchControl.value && searchControl.value.length >= 3 && results.length > 0 ? showDropdown = true : null"
      class="w-full rounded-xl border py-2.5 ps-10 pe-10 text-sm transition-all outline-none bg-slate-50 dark:bg-slate-800 text-slate-800 dark:text-slate-200 placeholder-slate-440 dark:placeholder-slate-500 border-slate-200 dark:border-slate-700"
      [ngClass]="{
        'border-rose-400 bg-rose-50 dark:bg-rose-950/20 focus:ring-2 focus:ring-rose-500/20': isInvalid,
        'focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-400': !isInvalid
      }"
    />
    
    <button *ngIf="showMap" type="button" (click)="toggleMap()" class="absolute end-3.5 top-1/2 -translate-y-1/2 text-indigo-500 hover:text-indigo-600 dark:text-indigo-400 dark:hover:text-indigo-300 transition-colors z-10" [title]="'Pick on Map' | translate">
      <i class="pi pi-map text-sm"></i>
    </button>
    
    <i *ngIf="isLoading" class="pi pi-spin pi-spinner absolute" [ngClass]="showMap ? 'end-10' : 'end-3.5'" style="top: 50%; transform: translateY(-50%); color: #94a3b8; font-size: 0.875rem;"></i>
    
    <!-- Dropdown -->
    <div *ngIf="showDropdown" class="absolute z-50 w-full mt-1 bg-white dark:bg-slate-800 rounded-xl shadow-lg border border-slate-100 dark:border-slate-700 max-h-60 overflow-y-auto">
      <ul class="py-1">
        <li *ngFor="let result of results" 
            (mousedown)="selectAddress(result)"
            class="px-4 py-2.5 text-sm hover:bg-slate-50 dark:hover:bg-slate-700 cursor-pointer flex flex-col gap-0.5 border-b border-slate-50 dark:border-slate-700/50 last:border-0 text-slate-700 dark:text-slate-300">
          <span class="font-semibold text-slate-900 dark:text-white">{{ result.properties.name || result.properties.street || result.properties.city }}</span>
          <span class="text-xs text-slate-500 dark:text-slate-400">{{ photonService.formatAddress(result) }}</span>
        </li>
      </ul>
    </div>
  </div>
  
  <p *ngIf="isInvalid && errorMessage" class="mt-1 text-xs text-rose-600 flex items-center gap-1 font-semibold">
    <i class="pi pi-exclamation-circle text-[10px]"></i>
    {{ errorMessage | translate }}
  </p>

  <!-- Map Container -->
  <div *ngIf="showMap && hasMapData && isMapExpanded" class="mt-3 w-full h-[250px] rounded-xl border border-slate-200 dark:border-slate-700 overflow-hidden relative z-0 shadow-sm transition-all duration-300">
    <div #mapElement class="w-full h-full cursor-crosshair"></div>
  </div>
</div>
