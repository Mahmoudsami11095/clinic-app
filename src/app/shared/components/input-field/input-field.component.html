<div [formGroup]="formGroup" class="relative group text-start">
  <label class="block text-sm font-semibold text-slate-700 dark:text-slate-350 mb-1.5" [for]="controlName">
    {{ label | translate }}
    <span *ngIf="subLabel" class="text-[10px] font-medium text-slate-400 dark:text-slate-500 ml-1">
      {{ subLabel | translate }}
    </span>
    <span *ngIf="required" class="text-rose-500">*</span>
  </label>
  
  <div class="relative">
    <i *ngIf="icon" [class]="icon" class="absolute start-3.5 text-slate-400 dark:text-slate-500 text-sm"
       [ngClass]="type === 'textarea' ? 'top-3.5' : 'top-1/2 -translate-y-1/2'"></i>
    
    <textarea
      *ngIf="type === 'textarea'"
      [id]="controlName"
      [formControlName]="controlName"
      [placeholder]="placeholder"
      rows="2"
      class="w-full rounded-xl border py-2.5 px-4 text-sm transition-all outline-none resize-none bg-slate-50 dark:bg-slate-800 text-slate-800 dark:text-slate-200 placeholder-slate-440 dark:placeholder-slate-500 border-slate-200 dark:border-slate-700"
      [ngClass]="{
        'ps-10': icon,
        'border-rose-400 bg-rose-50 dark:bg-rose-950/20 focus:ring-2 focus:ring-rose-500/20': isInvalid(),
        'focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-400': !isInvalid()
      }"
    ></textarea>
    
    <!-- Password field -->
    <ng-container *ngIf="type === 'password'">
      <input
        [id]="controlName"
        [type]="showPassword ? 'text' : 'password'"
        [formControlName]="controlName"
        [placeholder]="placeholder"
        class="w-full rounded-xl border py-2.5 px-4 text-sm transition-all outline-none bg-slate-50 dark:bg-slate-800 text-slate-800 dark:text-slate-200 placeholder-slate-440 dark:placeholder-slate-500 border-slate-200 dark:border-slate-700"
        [ngClass]="{
          'ps-10': icon,
          'pe-10': true,
          'border-rose-400 bg-rose-50 dark:bg-rose-950/20 focus:ring-2 focus:ring-rose-500/20': isInvalid(),
          'focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-400': !isInvalid()
        }"
      />
      <button type="button" (click)="showPassword = !showPassword"
              class="absolute end-3.5 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-650 dark:hover:text-slate-350 cursor-pointer focus:outline-none bg-transparent border-0">
        <i [class]="showPassword ? 'pi pi-eye-slash' : 'pi pi-eye'" class="text-sm"></i>
      </button>
    </ng-container>
    
    <!-- Generic Input field -->
    <input
      *ngIf="type !== 'textarea' && type !== 'password'"
      [id]="controlName"
      [type]="type"
      [formControlName]="controlName"
      [placeholder]="placeholder"
      class="w-full rounded-xl border py-2.5 px-4 text-sm transition-all outline-none bg-slate-50 dark:bg-slate-800 text-slate-800 dark:text-slate-200 placeholder-slate-440 dark:placeholder-slate-500 border-slate-200 dark:border-slate-700"
      [ngClass]="{
        'ps-10': icon,
        'border-rose-400 bg-rose-50 dark:bg-rose-950/20 focus:ring-2 focus:ring-rose-500/20': isInvalid(),
        'focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-400': !isInvalid()
      }"
    />
  </div>
  
  <p *ngIf="isInvalid()" class="mt-1 text-xs text-rose-600 flex items-center gap-1 font-semibold">
    <i class="pi pi-exclamation-circle text-[10px]"></i>
    {{ getError() | translate }}
  </p>
</div>
