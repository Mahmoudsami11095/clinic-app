<div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
  <!-- Doctor Card -->
  <button type="button" (click)="selectRole('doctor')"
          [class]="selectedRole() === 'doctor' ? 'border-indigo-600 ring-2 ring-indigo-500/25 bg-white dark:bg-slate-800 shadow-md' : 'border-slate-200 dark:border-slate-700 bg-slate-50/50 dark:bg-slate-800/40'"
          class="p-6 border rounded-2xl text-center transition-all cursor-pointer group focus:outline-none hover:border-indigo-500 dark:hover:border-indigo-400 hover:bg-white dark:hover:bg-slate-800 hover:shadow-md">
    <div class="w-12 h-12 rounded-xl bg-indigo-50 dark:bg-indigo-950/50 text-indigo-600 dark:text-indigo-400 flex items-center justify-center mx-auto mb-4 group-hover:scale-110 transition-transform">
      <i class="pi pi-heart-fill text-lg"></i>
    </div>
    <h5 class="font-bold text-slate-850 dark:text-slate-250 text-sm">Doctor</h5>
    <p class="text-xs text-slate-450 dark:text-slate-500 mt-2 leading-relaxed">Join as a practitioner to manage charts and patients.</p>
  </button>

  <!-- Patient Card -->
  <button type="button" (click)="selectRole('patient')"
          [class]="selectedRole() === 'patient' ? 'border-emerald-600 ring-2 ring-emerald-500/25 bg-white dark:bg-slate-800 shadow-md' : 'border-slate-200 dark:border-slate-700 bg-slate-50/50 dark:bg-slate-800/40'"
          class="p-6 border rounded-2xl text-center transition-all cursor-pointer group focus:outline-none hover:border-indigo-500 dark:hover:border-indigo-400 hover:bg-white dark:hover:bg-slate-800 hover:shadow-md">
    <div class="w-12 h-12 rounded-xl bg-emerald-50 dark:bg-emerald-950/50 text-emerald-600 dark:text-emerald-400 flex items-center justify-center mx-auto mb-4 group-hover:scale-110 transition-transform">
      <i class="pi pi-user text-lg"></i>
    </div>
    <h5 class="font-bold text-slate-850 dark:text-slate-250 text-sm">Patient</h5>
    <p class="text-xs text-slate-450 dark:text-slate-500 mt-2 leading-relaxed">Join as a patient to schedule visits and view statements.</p>
  </button>

  <!-- Assistant Card -->
  <button type="button" (click)="selectRole('assistant')"
          [class]="selectedRole() === 'assistant' ? 'border-amber-600 ring-2 ring-amber-500/25 bg-white dark:bg-slate-800 shadow-md' : 'border-slate-200 dark:border-slate-700 bg-slate-50/50 dark:bg-slate-800/40'"
          class="p-6 border rounded-2xl text-center transition-all cursor-pointer group focus:outline-none hover:border-indigo-500 dark:hover:border-indigo-400 hover:bg-white dark:hover:bg-slate-800 hover:shadow-md">
    <div class="w-12 h-12 rounded-xl bg-amber-50 dark:bg-amber-950/50 text-amber-600 dark:text-amber-400 flex items-center justify-center mx-auto mb-4 group-hover:scale-110 transition-transform">
      <i class="pi pi-briefcase text-lg"></i>
    </div>
    <h5 class="font-bold text-slate-850 dark:text-slate-250 text-sm">Assistant</h5>
    <p class="text-xs text-slate-450 dark:text-slate-500 mt-2 leading-relaxed">Join to assist doctors and manage appointments.</p>
  </button>
</div>
