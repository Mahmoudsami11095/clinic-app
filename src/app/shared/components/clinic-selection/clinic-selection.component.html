<div class="space-y-5 text-start animate-in fade-in duration-200">
  <!-- Existing Clinics Selection -->
  <div *ngIf="clinics.length > 0">
    <div class="flex items-center gap-2.5 mb-3">
      <div class="w-7 h-7 rounded-lg bg-indigo-50 dark:bg-indigo-950/50 flex items-center justify-center">
        <i class="pi pi-building text-indigo-600 dark:text-indigo-400 text-xs"></i>
      </div>
      <div>
        <h4 class="text-xs font-bold text-slate-700 dark:text-slate-300 uppercase tracking-wider">Join Existing Clinics</h4>
        <p class="text-xs text-slate-400 dark:text-slate-500">Select clinics you practice in and configure your schedule.</p>
      </div>
    </div>

    <div class="space-y-2.5 max-h-[25vh] overflow-y-auto pr-1">
      <div *ngFor="let clinic of clinics" 
           class="p-3.5 border rounded-2xl transition-all duration-200"
           [ngClass]="clinic.selected 
             ? 'border-indigo-200 dark:border-indigo-800/50 bg-indigo-50/50 dark:bg-indigo-950/20 shadow-sm' 
             : 'border-slate-100 dark:border-slate-850 bg-slate-50/40 dark:bg-slate-950/20 hover:border-slate-200 dark:hover:border-slate-700'">
        <label class="flex items-center gap-2.5 cursor-pointer">
          <input type="checkbox" [checked]="clinic.selected" (change)="toggleClinicSelection(clinic.id)"
                 class="w-4 h-4 rounded text-indigo-600 focus:ring-indigo-500/20 border-slate-300 dark:border-slate-700">
          <span class="text-xs font-bold text-slate-800 dark:text-slate-200">{{ clinic.name }}</span>
          <span *ngIf="clinic.selected" class="ms-auto text-xs text-indigo-500 dark:text-indigo-400 font-semibold flex items-center gap-1">
            <i class="pi pi-check-circle text-xs"></i> Selected
          </span>
        </label>

        <!-- Show hours/days config only if clinic is selected -->
        <div *ngIf="clinic.selected" class="mt-3 pt-3 border-t border-indigo-100 dark:border-indigo-900/30 space-y-3 animate-in slide-in-from-top-1 duration-200">
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
            <div>
              <label class="block text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-1">Hours</label>
              <input type="text" [(ngModel)]="clinic.hours" [ngModelOptions]="{standalone: true}" required
                     placeholder="e.g. 09:00-17:00"
                     class="w-full bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl py-2 px-3 text-xs focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500/50 text-slate-850 dark:text-slate-200 font-semibold">
            </div>
            <div>
              <label class="block text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-1">Days</label>
              <div class="flex flex-wrap gap-1">
                <button *ngFor="let day of ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat']; let i = index"
                        type="button"
                        (click)="toggleClinicDay(clinic.id, ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'][i])"
                        class="w-8 h-8 text-xs font-bold rounded-lg border transition-all cursor-pointer flex items-center justify-center"
                        [ngClass]="clinic.days.includes(['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'][i])
                          ? 'bg-indigo-600 text-white border-indigo-600'
                          : 'bg-white dark:bg-slate-850 text-slate-550 dark:text-slate-400 border-slate-200 dark:border-slate-750 hover:border-indigo-350 hover:text-indigo-600'"
                >
                  {{ day.charAt(0) }}
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Divider -->
  <div *ngIf="clinics.length > 0" class="relative flex items-center">
    <div class="flex-grow border-t border-slate-100 dark:border-slate-800"></div>
    <span class="px-3 text-xs font-bold text-slate-400 dark:text-slate-500 uppercase tracking-widest">or</span>
    <div class="flex-grow border-t border-slate-100 dark:border-slate-800"></div>
  </div>

  <!-- Create New Clinic Toggle -->
  <div>
    <button type="button" (click)="showCreateClinic.set(!showCreateClinic())"
            class="w-full flex items-center justify-between p-4 border rounded-2xl transition-all duration-200 cursor-pointer group focus:outline-none"
            [ngClass]="showCreateClinic() 
              ? 'border-indigo-200 dark:border-indigo-800/50 bg-indigo-50/40 dark:bg-indigo-950/20' 
              : 'border-slate-200 dark:border-slate-750 bg-white dark:bg-slate-900 hover:border-indigo-300 dark:hover:border-indigo-700 hover:bg-indigo-50/20 dark:hover:bg-indigo-950/10'">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 rounded-xl flex items-center justify-center transition-all duration-200"
             [ngClass]="showCreateClinic() 
               ? 'bg-indigo-600 text-white shadow-md shadow-indigo-500/25' 
               : 'bg-slate-100 dark:bg-slate-800 text-slate-400 dark:text-slate-500 group-hover:bg-indigo-100 dark:group-hover:bg-indigo-900/30 group-hover:text-indigo-600 dark:group-hover:text-indigo-400'">
          <i class="pi text-sm" [ngClass]="showCreateClinic() ? 'pi-minus' : 'pi-plus'"></i>
        </div>
        <div class="text-start">
          <h5 class="text-xs font-bold text-slate-800 dark:text-slate-200">Create New Clinic</h5>
          <p class="text-xs text-slate-400 dark:text-slate-500 mt-0.5">Register a new clinic that isn't listed above.</p>
        </div>
      </div>
      <i class="pi text-xs text-slate-400 dark:text-slate-500 transition-transform duration-200"
         [ngClass]="showCreateClinic() ? 'pi-chevron-up' : 'pi-chevron-down'"></i>
    </button>

    <!-- Collapsible Create Clinic Form -->
    <div *ngIf="showCreateClinic()" [formGroup]="formGroup" class="mt-3 p-4 border border-indigo-100 dark:border-indigo-900/30 rounded-2xl bg-gradient-to-b from-indigo-50/30 to-white dark:from-indigo-950/10 dark:to-slate-900 space-y-4 animate-in slide-in-from-top-2 duration-200">
      
      <!-- Clinic Name -->
      <app-input-field
        [formGroup]="formGroup"
        controlName="clinicName"
        label="Clinic Name"
        placeholder="e.g. My Dental Clinic"
        icon="pi pi-building"
        [required]="false"
      ></app-input-field>

      <!-- Expand details when name has 3+ chars -->
      <div *ngIf="formGroup.get('clinicName')?.value && formGroup.get('clinicName')?.value.trim().length >= 3" class="space-y-4 animate-in fade-in slide-in-from-top-1 duration-200">
        
        <!-- Address Map -->
        <div>
          <label class="block text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-1.5">Clinic Location <span class="text-red-500">*</span></label>
          <div [ngClass]="{'ring-2 ring-rose-400 rounded-lg': formGroup.get('clinicAddress')?.invalid && (formGroup.get('clinicAddress')?.touched || formGroup.get('clinicAddress')?.dirty)}">
            <app-location-map 
              (locationPicked)="onClinicLocationPicked($event)"
              [initialAddress]="formGroup.get('clinicAddress')?.value"
              [readOnly]="false"
              [height]="'200px'">
            </app-location-map>
          </div>
          <p *ngIf="formGroup.get('clinicAddress')?.invalid && (formGroup.get('clinicAddress')?.touched || formGroup.get('clinicAddress')?.dirty)" class="mt-1 text-xs text-rose-600 font-semibold flex items-center gap-1">
            <i class="pi pi-exclamation-circle text-[10px]"></i> Please pick a location on the map.
          </p>
        </div>

        <!-- Phone Number -->
        <app-phone-input-field
          [formGroup]="formGroup"
          countryCodeName="newClinicCountryCode"
          phoneNumberName="newClinicPhoneNumber"
          label="Clinic Phone"
          [required]="true"
        ></app-phone-input-field>

        <!-- Hours & Days Stacked vertically -->
        <div class="space-y-4">
          <div>
            <label class="block text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-1">Availability Hours <span class="text-red-500">*</span></label>
            <div class="flex items-center gap-2">
              <div class="relative flex-1">
                <input type="time" formControlName="clinicAvailabilityStart"
                       class="w-full bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl py-2.5 px-3 text-xs focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500/50 text-slate-850 dark:text-slate-200 font-semibold cursor-pointer"
                       [ngClass]="{'border-rose-400 bg-rose-50 dark:bg-rose-950/20': formGroup.get('clinicAvailabilityStart')?.invalid && (formGroup.get('clinicAvailabilityStart')?.touched || formGroup.get('clinicAvailabilityStart')?.dirty)}">
              </div>
              <span class="text-slate-400 font-bold text-xs">to</span>
              <div class="relative flex-1">
                <input type="time" formControlName="clinicAvailabilityEnd"
                       class="w-full bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl py-2.5 px-3 text-xs focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500/50 text-slate-850 dark:text-slate-200 font-semibold cursor-pointer"
                       [ngClass]="{'border-rose-400 bg-rose-50 dark:bg-rose-950/20': formGroup.get('clinicAvailabilityEnd')?.invalid && (formGroup.get('clinicAvailabilityEnd')?.touched || formGroup.get('clinicAvailabilityEnd')?.dirty)}">
              </div>
            </div>
            <p *ngIf="(formGroup.get('clinicAvailabilityStart')?.invalid || formGroup.get('clinicAvailabilityEnd')?.invalid) && (formGroup.get('clinicAvailabilityStart')?.touched || formGroup.get('clinicAvailabilityEnd')?.touched)" class="mt-1 text-xs text-rose-600 font-semibold flex items-center gap-1">
              <i class="pi pi-exclamation-circle text-[10px]"></i> Please enter both start and end hours.
            </p>
          </div>
          <div>
            <label class="block text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-1">Availability Days <span class="text-red-500">*</span></label>
            <div class="flex flex-wrap gap-1">
              <button *ngFor="let day of ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat']; let i = index"
                      type="button"
                      (click)="toggleRegisterClinicDay(['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'][i])"
                      class="w-8 h-8 text-xs font-bold rounded-lg border transition-all cursor-pointer flex items-center justify-center"
                      [ngClass]="selectedClinicDays().includes(['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'][i])
                        ? 'bg-indigo-600 text-white border-indigo-600'
                        : 'bg-white dark:bg-slate-850 text-slate-550 dark:text-slate-400 border-slate-200 dark:border-slate-750 hover:border-indigo-300 hover:text-indigo-600'"
              >
                {{ day.charAt(0) }}
              </button>
            </div>
            <p *ngIf="formGroup.get('clinicAvailabilityDays')?.invalid && formGroup.get('clinicAvailabilityDays')?.touched" class="mt-1 text-xs text-rose-600 font-semibold flex items-center gap-1">
              <i class="pi pi-exclamation-circle text-[10px]"></i> Please select at least one availability day.
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
