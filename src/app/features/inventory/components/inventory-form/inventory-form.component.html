<div class="fixed inset-0 bg-slate-900/60 backdrop-blur-md z-50 flex items-center justify-center p-4" aria-labelledby="modal-title" role="dialog" aria-modal="true" (click)="onCancel()">
  <div class="bg-white dark:bg-slate-800 rounded-3xl shadow-2xl w-full max-w-lg overflow-hidden relative" (click)="$event.stopPropagation()">
    <div class="px-6 pt-6 pb-4 sm:px-8 sm:pt-8 sm:pb-6">
      <h3 class="text-xl leading-6 font-semibold text-gray-900 dark:text-white mb-6" id="modal-title">
        {{ material ? ('inventory.edit_material' | translate) : ('inventory.add_new_material' | translate) }}
      </h3>
      
      <div *ngIf="error" class="bg-red-50 dark:bg-red-900/30 border border-red-200 dark:border-red-800 text-red-600 dark:text-red-400 px-4 py-3 rounded-xl mb-6 text-sm font-medium">
        {{ error }}
      </div>

      <form [formGroup]="materialForm" (ngSubmit)="onSubmit()">
        <div class="mb-5">
          <label class="block text-slate-700 dark:text-slate-300 text-sm font-semibold mb-2" for="name">
            {{ 'inventory.material_name' | translate }} <span class="text-red-500">*</span>
          </label>
          <input 
            class="w-full px-4 py-3 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all dark:text-white placeholder-slate-400" 
            id="name" 
            type="text" 
            formControlName="name" 
            [placeholder]="'inventory.name_placeholder' | translate">
          <p *ngIf="materialForm.get('name')?.invalid && materialForm.get('name')?.touched" class="text-red-500 text-xs font-medium mt-2">
            {{ 'inventory.name_required' | translate }}
          </p>
        </div>

        <div class="mb-5">
          <label class="block text-slate-700 dark:text-slate-300 text-sm font-semibold mb-2" for="quantity">
            {{ 'inventory.quantity' | translate }} <span class="text-red-500">*</span>
          </label>
          <input 
            class="w-full px-4 py-3 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all dark:text-white placeholder-slate-400" 
            id="quantity" 
            type="number" 
            formControlName="quantity" 
            min="0">
          <p *ngIf="materialForm.get('quantity')?.invalid && materialForm.get('quantity')?.touched" class="text-red-500 text-xs font-medium mt-2">
            {{ 'inventory.quantity_required' | translate }}
          </p>
        </div>

        <div class="mb-6">
          <label class="block text-slate-700 dark:text-slate-300 text-sm font-semibold mb-2" for="unit">
            {{ 'inventory.unit' | translate }} <span class="text-slate-400 font-normal">{{ 'inventory.optional' | translate }}</span>
          </label>
          <input 
            class="w-full px-4 py-3 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all dark:text-white placeholder-slate-400" 
            id="unit" 
            type="text" 
            formControlName="unit" 
            [placeholder]="'inventory.unit_placeholder' | translate">
        </div>
        
        <div class="flex flex-col-reverse sm:flex-row sm:justify-end gap-3 mt-8">
          <button 
            type="button" 
            class="w-full sm:w-auto px-6 py-2.5 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-700 dark:text-slate-300 font-medium hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors focus:ring-2 focus:ring-slate-200 dark:focus:ring-slate-700 outline-none"
            (click)="onCancel()"
            [disabled]="isSubmitting">
            {{ 'common.cancel' | translate }}
          </button>
          <button 
            type="submit" 
            class="w-full sm:w-auto px-6 py-2.5 rounded-xl bg-blue-600 hover:bg-blue-700 text-white font-medium transition-colors focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 dark:focus:ring-offset-slate-800 outline-none disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center"
            [disabled]="materialForm.invalid || isSubmitting">
            <span *ngIf="isSubmitting" class="animate-spin rounded-full h-4 w-4 border-b-2 border-white mr-2"></span>
            {{ 'inventory.save_material' | translate }}
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
