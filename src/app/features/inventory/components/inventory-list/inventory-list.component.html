<div class="inventory-container p-6">
  <div class="flex justify-between items-center mb-6">
    <h2 class="text-2xl font-semibold text-gray-800 dark:text-white">Material Inventory</h2>
    <button class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg transition-colors" (click)="openAddForm()">
      <i class="fas fa-plus mr-2"></i> Add Material
    </button>
  </div>

  <div class="mb-6 flex flex-col sm:flex-row gap-4" *ngIf="materials.length > 0 || searchTerm || clinicService.allowedClinics().length > 0">
    <div class="relative max-w-md flex-1">
      <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
        <i class="fas fa-search text-gray-400"></i>
      </div>
      <input 
        type="text" 
        [(ngModel)]="searchTerm" 
        class="block w-full pl-10 pr-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-800 text-gray-900 dark:text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500 sm:text-sm transition-colors" 
        placeholder="Search materials by name...">
    </div>
    
    <div class="relative max-w-xs flex-1">
      <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
        <i class="fas fa-building text-gray-400"></i>
      </div>
      <select 
        [value]="activeClinicId"
        (change)="onClinicChange($event)"
        class="block w-full pl-10 pr-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-800 text-gray-900 dark:text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500 sm:text-sm transition-colors appearance-none">
        <option value="all">All Clinics</option>
        <option *ngFor="let clinic of clinicService.allowedClinics()" [value]="clinic.id">
          {{ clinic.name }}
        </option>
      </select>
    </div>
  </div>

  <div *ngIf="loading" class="text-center py-8">
    <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600 mx-auto"></div>
  </div>

  <div *ngIf="error" class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4">
    {{ error }}
  </div>

  <div *ngIf="!loading && !error && materials.length === 0" class="text-center py-8 text-gray-500 bg-white dark:bg-gray-800 rounded-lg shadow">
    <p>No materials found in inventory. Click "Add Material" to start building your stock.</p>
  </div>

  <div *ngIf="!loading && materials.length > 0" class="bg-white dark:bg-gray-800 rounded-lg shadow overflow-hidden">
    <table class="min-w-full divide-y divide-gray-200 dark:divide-gray-700">
      <thead class="bg-gray-50 dark:bg-gray-900">
        <tr>
          <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider">Name</th>
          <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider">Quantity</th>
          <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider">Unit</th>
          <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider">Actions</th>
        </tr>
      </thead>
      <tbody class="bg-white dark:bg-gray-800 divide-y divide-gray-200 dark:divide-gray-700">
        <tr *ngFor="let material of filteredMaterials" class="hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors">
          <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900 dark:text-white">{{ material.name }}</td>
          <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500 dark:text-gray-300">
            <span [ngClass]="{'text-red-500 font-bold': material.quantity <= 5}">{{ material.quantity }}</span>
          </td>
          <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500 dark:text-gray-300">{{ material.unit || '-' }}</td>
          <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
            <button class="text-blue-600 hover:text-blue-900 dark:hover:text-blue-400 mr-4" (click)="openEditForm(material)">
              <i class="fas fa-edit"></i> Edit
            </button>
            <button class="text-red-600 hover:text-red-900 dark:hover:text-red-400" (click)="deleteMaterial(material.id!)">
              <i class="fas fa-trash"></i> Delete
            </button>
          </td>
        </tr>
      </tbody>
    </table>
    
    <div *ngIf="filteredMaterials.length === 0 && !loading" class="text-center py-8 text-gray-500 bg-white dark:bg-gray-800">
      <p>No materials match your search.</p>
    </div>
  </div>
</div>

<app-inventory-form 
  *ngIf="showForm" 
  [material]="selectedMaterial" 
  [doctorId]="doctorId"
  [clinicId]="activeClinicId"
  (saved)="onSaved()" 
  (cancelled)="closeForm()">
</app-inventory-form>
