<form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate class="space-y-6">

  <!-- Section 1: Professional Profile -->
  <div>
    <h3 class="text-xs font-bold uppercase tracking-wider text-slate-400 dark:text-slate-500 mb-4 flex items-center gap-2">
      <span class="w-5 h-5 bg-indigo-100 dark:bg-indigo-950/45 text-indigo-600 dark:text-indigo-400 rounded-full flex items-center justify-center text-[10px] font-bold">1</span>
      {{ 'doctors.professional_profile' | translate }}
    </h3>

    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
      <!-- First Name -->
      <app-input-field
        [formGroup]="form"
        controlName="firstName"
        label="patients.first_name"
        placeholder="e.g. Sarah"
        [required]="true"
      ></app-input-field>

      <!-- Last Name -->
      <app-input-field
        [formGroup]="form"
        controlName="lastName"
        label="patients.last_name"
        placeholder="e.g. Jenkins"
        [required]="true"
      ></app-input-field>

      <!-- Specialization -->
      <div>
        <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1.5" for="specialization">
          {{ 'doctors.specialty' | translate }} <span class="text-rose-500">*</span>
        </label>
        <select
          id="specialization"
          formControlName="specialization"
          class="w-full rounded-xl border py-2.5 px-4 text-sm transition-all outline-none appearance-none bg-no-repeat custom-select text-slate-850 dark:text-slate-200"
          [ngClass]="isInvalid('specialization')
            ? 'border-rose-400 bg-rose-50 dark:bg-rose-950/20 focus:ring-2 focus:ring-rose-500/20'
            : 'border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-400'"
        >
          <option value="" class="dark:bg-slate-800" disabled>{{ 'doctors.select_role' | translate }}</option>
          @for (spec of specializations; track spec) {
            <option [value]="spec" class="dark:bg-slate-800">{{ 'doctors.spec_' + spec.toLowerCase().replace(' ', '_') | translate }}</option>
          }
        </select>
      </div>

      <!-- Phone -->
      <app-phone-input-field
        [formGroup]="form"
        countryCodeName="countryCode"
        phoneNumberName="phoneNumber"
        label="doctors.phone"
        [required]="true"
      ></app-phone-input-field>

      <!-- Email (Full width) -->
      <div class="sm:col-span-2">
        <app-input-field
          [formGroup]="form"
          controlName="email"
          label="doctors.professional_email"
          type="email"
          placeholder="doctor.name@clinic.com"
          icon="pi pi-envelope"
          [required]="true"
        ></app-input-field>
      </div>
    </div>
  </div>

  <!-- Divider -->
  <div class="border-t border-slate-100 dark:border-slate-800"></div>

  <!-- Section 2: Availability -->
  <div formGroupName="availability">
    <h3 class="text-xs font-bold uppercase tracking-wider text-slate-400 dark:text-slate-500 mb-4 flex items-center gap-2">
      <span class="w-5 h-5 bg-indigo-100 dark:bg-indigo-950/45 text-indigo-600 dark:text-indigo-400 rounded-full flex items-center justify-center text-[10px] font-bold">2</span>
      {{ 'doctors.weekly_schedule' | translate }}
    </h3>

    <div class="space-y-4">
      <!-- Days Selection -->
      <div>
        <label class="block text-sm font-semibold text-slate-700 dark:text-slate-350 mb-3">{{ 'doctors.office_days' | translate }} <span class="text-rose-500">*</span></label>
        <div class="flex flex-wrap gap-2">
          @for (day of weekDays; track day) {
            <label
              class="relative flex items-center justify-center px-4 py-2 rounded-xl text-xs font-bold cursor-pointer transition-all border select-none"
              [ngClass]="isDaySelected(day)
                ? 'bg-indigo-600 text-white border-indigo-600 shadow-md transform scale-105'
                : 'bg-white dark:bg-slate-800 text-slate-500 dark:text-slate-400 border-slate-200 dark:border-slate-700 hover:border-indigo-300 hover:text-indigo-600 dark:hover:text-indigo-450'"
            >
              <input
                type="checkbox"
                [value]="day"
                (change)="onDayToggle(day, $event)"
                class="absolute opacity-0 w-0 h-0"
              />
              {{ 'common.day_' + day.toLowerCase() | translate }}
            </label>
          }
        </div>
        @if (daysFormArray.invalid && daysFormArray.touched) {
          <p class="mt-2 text-xs text-rose-600">{{ 'doctors.select_one_day' | translate }}</p>
        }
      </div>

      <!-- Hours -->
      <div>
        <label class="block text-sm font-semibold text-slate-700 dark:text-slate-350 mb-1.5" for="hours">{{ 'doctors.consultation_hours' | translate }} <span class="text-rose-500">*</span></label>
        <div class="relative">
          <i class="pi pi-clock absolute start-3.5 top-1/2 -translate-y-1/2 text-slate-400 dark:text-slate-500 text-sm"></i>
          <input
            id="hours"
            type="text"
            formControlName="hours"
            placeholder="e.g. 09:00 - 17:00"
            class="w-full rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 py-2.5 ps-10 pe-4 text-sm transition-all focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-400 outline-none text-slate-800 dark:text-slate-200 placeholder-slate-450 dark:placeholder-slate-500"
          />
        </div>
      </div>
    </div>
  </div>

  <!-- Footer Actions -->
  <div class="flex items-center justify-end gap-3 pt-6 border-t border-slate-100 dark:border-slate-800">
    <button
      type="button"
      (click)="onCancel()"
      class="px-5 py-2.5 rounded-xl text-sm font-semibold text-slate-600 dark:text-slate-300 bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors cursor-pointer"
    >
      {{ 'common.cancel' | translate }}
    </button>
    <button
      type="submit"
      [disabled]="submitting"
      class="inline-flex items-center gap-2 px-6 py-2.5 bg-indigo-600 text-white rounded-xl text-sm font-semibold hover:bg-indigo-700 disabled:opacity-60 disabled:cursor-not-allowed transition-all shadow-sm shadow-indigo-500/20 focus:outline-none focus:ring-2 focus:ring-indigo-500/40 cursor-pointer"
    >
      @if (submitting) {
        <i class="pi pi-spin pi-spinner text-xs"></i>
        {{ 'doctors.processing' | translate }}
      } @else {
        <i class="pi pi-user-plus text-xs"></i>
        {{ 'doctors.add_to_team' | translate }}
      }
    </button>
  </div>
</form>
