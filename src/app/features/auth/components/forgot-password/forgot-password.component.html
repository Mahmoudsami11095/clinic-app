<form class="space-y-4 animate-in fade-in slide-in-from-top-2 duration-300 transition-opacity" [class.pointer-events-none]="isLoading()" [class.opacity-60]="isLoading()">
  <div *ngIf="errorMessage()" class="bg-rose-50 dark:bg-rose-950/30 border border-rose-100 dark:border-rose-900/50 rounded-2xl p-4 text-xs font-bold text-rose-600 dark:text-rose-400 flex items-center gap-2.5 shadow-sm mb-4">
    <i class="pi pi-exclamation-triangle text-sm"></i>
    <span>{{ errorMessage() }}</span>
  </div>

  <div *ngIf="forgotStep() === 1" class="relative group">
    <div class="text-center mb-4">
      <h4 class="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-1">
        {{ 'auth.forgot_password' | translate }}
      </h4>
      <p class="text-xs font-medium text-slate-450 dark:text-slate-400 leading-normal">
        {{ 'auth.enter_email_for_reset' | translate }}
      </p>
    </div>
    <div class="relative">
      <i class="pi pi-envelope absolute start-4 top-1/2 -translate-y-1/2 text-slate-400 dark:text-slate-500 group-focus-within:text-indigo-500 transition-colors"></i>
      <input type="text" [ngModel]="forgotEmail()" (ngModelChange)="forgotEmail.set($event)" name="forgotEmail"
             class="w-full bg-slate-50/50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-2xl py-3.5 ps-12 pe-4 text-xs focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500/50 transition-all text-slate-800 dark:text-slate-200 placeholder-slate-400 dark:placeholder-slate-500 font-semibold"
             placeholder="doctor@medclinic.com">
    </div>
    <button type="button" (click)="sendForgotOtp()" [disabled]="isLoading()"
            class="w-full bg-indigo-600 hover:bg-indigo-700 disabled:opacity-50 text-white font-bold text-xs py-3.5 px-6 rounded-2xl transition-all duration-300 flex items-center justify-center gap-2 shadow-lg shadow-indigo-600/20 cursor-pointer group mt-4 focus:outline-none">
      <i *ngIf="isLoading()" class="pi pi-spin pi-spinner text-white text-xs"></i>
      <span *ngIf="!isLoading()">{{ 'auth.send_otp' | translate }}</span>
    </button>
    <button type="button" (click)="onCancel()" [disabled]="isLoading()"
            class="w-full mt-2 bg-slate-100 hover:bg-slate-200 dark:bg-slate-800 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-350 font-bold text-xs py-3 px-6 rounded-2xl transition-all cursor-pointer focus:outline-none flex items-center justify-center gap-1.5">
      <i class="pi pi-arrow-left text-xs rtl-flip"></i>
      <span>{{ 'auth.change_email' | translate }}</span>
    </button>
  </div>

  <div *ngIf="forgotStep() === 2" class="space-y-5">
    <div class="text-center">
      <h4 class="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-1">
        {{ 'auth.enter_otp_title' | translate }}
      </h4>
      <p class="text-xs font-medium text-slate-450 dark:text-slate-400 leading-normal">
        {{ 'auth.enter_otp_subtitle' | translate }} <span class="text-indigo-600 dark:text-indigo-400 font-semibold">{{ forgotEmail() }}</span>
      </p>
    </div>

    <app-otp-input-field [code]="forgotOtpCode()" (codeChange)="forgotOtpCode.set($event)" (otpComplete)="verifyForgotOtpNextStep()"></app-otp-input-field>

    <div class="text-center text-xs font-semibold text-slate-500 dark:text-slate-400">
      <span *ngIf="forgotCountdown() > 0" class="text-slate-400 dark:text-slate-500">
        {{ getForgotCountdownText() }}
      </span>
      <button type="button" *ngIf="forgotCountdown() === 0" (click)="sendForgotOtp()"
              class="text-indigo-600 dark:text-indigo-400 hover:text-indigo-800 dark:hover:text-indigo-300 transition-colors cursor-pointer focus:outline-none font-bold">
        {{ 'auth.resend_code' | translate }}
      </button>
    </div>

    <button type="button" (click)="verifyForgotOtpNextStep()" [disabled]="isLoading()"
            class="w-full bg-gradient-to-r from-indigo-600 to-indigo-700 hover:from-indigo-700 hover:to-indigo-800 disabled:opacity-50 text-white font-bold text-xs py-3.5 px-6 rounded-2xl transition-all duration-300 flex items-center justify-center gap-2 shadow-lg shadow-indigo-600/20 cursor-pointer group focus:outline-none">
      <span>Next</span>
    </button>
    <button type="button" (click)="onCancel()" [disabled]="isLoading()"
            class="w-full mt-2 bg-slate-100 hover:bg-slate-200 dark:bg-slate-800 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-350 font-bold text-xs py-3 px-6 rounded-2xl transition-all cursor-pointer focus:outline-none flex items-center justify-center gap-1.5">
      <i class="pi pi-arrow-left text-xs rtl-flip"></i>
      <span>{{ 'auth.change_email' | translate }}</span>
    </button>
  </div>

  <div *ngIf="forgotStep() === 3" class="space-y-4">
    <div class="text-center mb-4">
      <h4 class="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-1">
        {{ 'auth.reset_password' | translate }}
      </h4>
    </div>

    <div class="relative group">
      <label class="block text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-1.5">
        {{ 'auth.new_password' | translate }}
      </label>
      <div class="relative">
        <i class="pi pi-lock absolute start-4 top-1/2 -translate-y-1/2 text-slate-400 dark:text-slate-500 group-focus-within:text-indigo-500 transition-colors"></i>
        <input [type]="showForgotNewPassword() ? 'text' : 'password'" [ngModel]="forgotNewPassword()" (ngModelChange)="forgotNewPassword.set($event)" name="forgotNewPassword"
               class="w-full bg-slate-50/50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-2xl py-3.5 ps-12 pe-12 text-xs focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500/50 transition-all text-slate-800 dark:text-slate-200 placeholder-slate-400 dark:placeholder-slate-500 font-semibold"
               placeholder="••••••••">
        <button type="button" (click)="showForgotNewPassword.set(!showForgotNewPassword())" 
                class="absolute end-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 dark:text-slate-500 dark:hover:text-slate-350 transition-colors cursor-pointer focus:outline-none">
          <i [class]="showForgotNewPassword() ? 'pi pi-eye-slash' : 'pi pi-eye'" class="text-sm"></i>
        </button>
      </div>
    </div>

    <div class="relative group">
      <label class="block text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-1.5">
        {{ 'auth.confirm_password' | translate }}
      </label>
      <div class="relative">
        <i class="pi pi-lock absolute start-4 top-1/2 -translate-y-1/2 text-slate-400 dark:text-slate-500 group-focus-within:text-indigo-500 transition-colors"></i>
        <input [type]="showForgotConfirmPassword() ? 'text' : 'password'" [ngModel]="forgotConfirmPassword()" (ngModelChange)="forgotConfirmPassword.set($event)" name="forgotConfirmPassword"
               class="w-full bg-slate-50/50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-2xl py-3.5 ps-12 pe-12 text-xs focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500/50 transition-all text-slate-800 dark:text-slate-200 placeholder-slate-400 dark:placeholder-slate-500 font-semibold"
               placeholder="••••••••">
        <button type="button" (click)="showForgotConfirmPassword.set(!showForgotConfirmPassword())" 
                class="absolute end-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 dark:text-slate-500 dark:hover:text-slate-350 transition-colors cursor-pointer focus:outline-none">
          <i [class]="showForgotConfirmPassword() ? 'pi pi-eye-slash' : 'pi pi-eye'" class="text-sm"></i>
        </button>
      </div>
    </div>

    <button type="button" (click)="resetPassword()" [disabled]="isLoading()"
            class="w-full bg-gradient-to-r from-indigo-600 to-indigo-700 hover:from-indigo-700 hover:to-indigo-800 disabled:opacity-50 text-white font-bold text-xs py-3.5 px-6 rounded-2xl transition-all duration-300 flex items-center justify-center gap-2 shadow-lg shadow-indigo-600/20 cursor-pointer group mt-4 focus:outline-none">
      <i *ngIf="isLoading()" class="pi pi-spin pi-spinner text-white text-xs"></i>
      <span *ngIf="!isLoading()">{{ 'auth.reset_password' | translate }}</span>
    </button>
    <button type="button" (click)="onCancel()" [disabled]="isLoading()"
            class="w-full mt-2 bg-slate-100 hover:bg-slate-200 dark:bg-slate-800 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-350 font-bold text-xs py-3 px-6 rounded-2xl transition-all cursor-pointer focus:outline-none flex items-center justify-center gap-1.5">
      <i class="pi pi-arrow-left text-xs rtl-flip"></i>
      <span>Cancel</span>
    </button>
  </div>
</form>
