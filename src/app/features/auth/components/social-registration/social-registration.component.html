<!-- Multi-Stage Social Sign Up Modal Overlay -->
  <div *ngIf="currentStage() > 0" class="fixed inset-0 bg-slate-900/60 backdrop-blur-md z-50 flex items-center justify-center p-4">
    <div class="bg-white dark:bg-slate-900 rounded-3xl shadow-2xl border border-slate-100 dark:border-slate-800 w-full max-w-lg overflow-hidden animate-in fade-in zoom-in-95 duration-250">
      <!-- Modal Header -->
      <div class="px-6 py-4 border-b border-slate-100 dark:border-slate-800 flex items-center justify-between">
        <h3 class="font-extrabold text-lg text-slate-900 dark:text-white flex items-center gap-2">
          <i class="pi pi-user-plus text-indigo-500"></i>
          <span>Complete Social Sign Up</span>
        </h3>
        <button type="button" (click)="onCancel()" class="text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 transition-colors focus:outline-none cursor-pointer">
          <i class="pi pi-times text-sm"></i>
        </button>
      </div>

      <!-- Modal Body -->
      <div class="p-6 max-h-[75vh] overflow-y-auto">

        <!-- STAGE 2: Role Selection -->
        <div *ngIf="currentStage() === 2" class="space-y-6">
          <div class="text-center">
            <h4 class="text-sm font-bold text-slate-800 dark:text-white uppercase tracking-wider mb-1.5">Who are you?</h4>
            <p class="text-xs text-slate-500 dark:text-slate-400">Select your registration profile role below to proceed.</p>
          </div>

          <app-role-selection
            [selectedRole]="socialRole()"
            (roleChange)="onRoleChange($event)"
          ></app-role-selection>
        </div>

        <!-- STAGE 3: Data Completion -->
        <div *ngIf="currentStage() === 3" class="space-y-4 text-start">
          <div class="text-center mb-2">
            <h4 class="text-sm font-bold text-slate-800 dark:text-white uppercase tracking-wider mb-1">Additional Information</h4>
            <p class="text-xs text-slate-500 dark:text-slate-400">Fill in the missing fields to complete your <span class="capitalize font-semibold text-indigo-500">{{ socialRole() }}</span> account.</p>
          </div>

          <form [formGroup]="socialForm" (ngSubmit)="onSubmitSocialExtraData()" class="space-y-4 transition-opacity duration-300" [class.pointer-events-none]="isLoading()" [class.opacity-60]="isLoading()">
            
            <!-- Password Field -->
            <app-input-field
              [formGroup]="socialForm"
              controlName="password"
              label="auth.password"
              type="password"
              placeholder="••••••••"
              icon="pi pi-lock"
            ></app-input-field>

            <!-- Shared Profile Details Form -->
            <app-profile-details-form
              [parentFormGroup]="socialForm"
              [role]="socialRole()"
              [specializationGroups]="specializationGroups()"
            ></app-profile-details-form>

            <!-- Clinic ID selection (Patients only) -->
            <div *ngIf="socialRole() === 'patient'">
              <label class="block text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-1.5">Associated Clinic</label>
              <select formControlName="clinicId"
                      class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl py-3 px-4 text-xs focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500/50 text-slate-850 dark:text-slate-200 font-semibold">
                <option value="clinic-1">City Health Clinic (clinic-1)</option>
                <option value="clinic-2">Metro Dental & Cardiac (clinic-2)</option>
                <option value="clinic-3">Westside Family Care (clinic-3)</option>
              </select>
            </div>

            <!-- Submit buttons -->
            <div class="flex gap-3 pt-4 border-t border-slate-100 dark:border-slate-800">
              <button type="button" (click)="currentStage.set(2)"
                      class="flex-1 py-3 border border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-350 hover:bg-slate-50 dark:hover:bg-slate-800 rounded-xl text-xs font-bold transition-all cursor-pointer">
                Back
              </button>
              <button type="submit" [disabled]="isLoading()"
                      class="flex-1 py-3 bg-indigo-600 hover:bg-indigo-700 disabled:opacity-50 text-white rounded-xl text-xs font-bold transition-all shadow-md shadow-indigo-500/20 flex items-center justify-center gap-2 cursor-pointer">
                <i *ngIf="isLoading()" class="pi pi-spin pi-spinner text-white text-xs"></i>
                <span>{{ socialRole() === 'doctor' ? 'Next' : 'Register & Log In' }}</span>
              </button>
            </div>
          </form>
        </div>

        <!-- STAGE 5: Social Phone OTP Verification -->
        <div *ngIf="currentStage() === 5" class="space-y-6 text-center animate-in fade-in slide-in-from-top-2 duration-300">
          <app-verification-step
            [phoneOtpCode]="socialOtpCode()"
            (phoneOtpCodeChange)="socialOtpCode.set($event)"
            [showEmail]="false"
            [showPhone]="true"
            [phoneNumberFormatted]="socialForm.value.countryCode + socialForm.value.phoneNumber"
            [isLoading]="isLoading()"
            (otpSubmit)="submitSocialOtp()"
            (back)="goBackToSocialData()"
          ></app-verification-step>
        </div>

        <!-- STAGE 4: Doctor Clinic Details & Availability (Doctor only) -->
        <div *ngIf="currentStage() === 4" class="space-y-4 text-start">
          <form [formGroup]="socialForm" (ngSubmit)="onSubmitSocialExtraData()" class="space-y-4 transition-opacity duration-300" [class.pointer-events-none]="isLoading()" [class.opacity-60]="isLoading()">
            <div class="max-h-[50vh] overflow-y-auto pr-1">
              <app-clinic-selection
                [formGroup]="clinicDetailsGroup"
                [clinics]="socialClinics()"
              ></app-clinic-selection>
            </div>
 
            <!-- Stage 4 Buttons -->
            <div class="flex gap-3 pt-4 border-t border-slate-100 dark:border-slate-800">
              <button type="button" (click)="currentStage.set(3)"
                      class="flex-1 py-3 border border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-350 hover:bg-slate-50 dark:hover:bg-slate-800 rounded-xl text-xs font-bold transition-all cursor-pointer">
                Back
              </button>
              <button type="submit" [disabled]="isLoading()"
                      class="flex-1 py-3 bg-indigo-600 hover:bg-indigo-700 disabled:opacity-50 text-white rounded-xl text-xs font-bold transition-all shadow-md shadow-indigo-500/20 flex items-center justify-center gap-2 cursor-pointer">
                <i *ngIf="isLoading()" class="pi pi-spin pi-spinner text-white text-xs"></i>
                <span>Register & Log In</span>
              </button>
            </div>
          </form>
        </div>

      </div>
    </div>
  </div>
