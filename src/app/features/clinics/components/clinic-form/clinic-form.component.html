<form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-5">
  <!-- Clinic Name -->
  <div>
    <label for="name" class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1.5">{{ 'clinics.name' | translate }}</label>
    <div class="relative">
      <input
        type="text"
        id="name"
        formControlName="name"
        [placeholder]="'clinics.name_placeholder' | translate"
        [class]="isInvalid('name') ? 'border-red-500 focus:ring-red-500/20 focus:border-red-500 dark:border-rose-500/50 dark:focus:ring-rose-500/30' : 'border-slate-200 focus:ring-indigo-500/20 focus:border-indigo-500 dark:border-slate-700 dark:focus:ring-indigo-500/30 dark:focus:border-indigo-500'"
        class="w-full bg-slate-50 border rounded-xl py-2.5 px-4 text-sm focus:outline-none focus:ring-2 transition-all text-slate-700 placeholder-slate-400 dark:bg-slate-800 dark:text-slate-200 dark:placeholder-slate-500"
      />
    </div>
    @if (isInvalid('name')) {
      <p class="text-xs text-red-500 mt-1">{{ 'clinics.name_error' | translate }}</p>
    }
  </div>

  <!-- Address -->
  <div>
    <label for="address" class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1.5">{{ 'clinics.address' | translate }}</label>
    <div class="relative">
      <input
        type="text"
        id="address"
        formControlName="address"
        [placeholder]="'clinics.address_placeholder' | translate"
        [class]="isInvalid('address') ? 'border-red-500 focus:ring-red-500/20 focus:border-red-500 dark:border-rose-500/50 dark:focus:ring-rose-500/30' : 'border-slate-200 focus:ring-indigo-500/20 focus:border-indigo-500 dark:border-slate-700 dark:focus:ring-indigo-500/30 dark:focus:border-indigo-500'"
        class="w-full bg-slate-50 border rounded-xl py-2.5 px-4 text-sm focus:outline-none focus:ring-2 transition-all text-slate-700 placeholder-slate-400 dark:bg-slate-800 dark:text-slate-200 dark:placeholder-slate-500"
      />
    </div>
    @if (isInvalid('address')) {
      <p class="text-xs text-red-500 mt-1">{{ 'clinics.address_error' | translate }}</p>
    }
  </div>

  <!-- Phone -->
  <div>
    <label for="phone" class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1.5">{{ 'clinics.phone' | translate }}</label>
    <div class="relative">
      <input
        type="text"
        id="phone"
        formControlName="phone"
        [placeholder]="'clinics.phone_placeholder' | translate"
        [class]="isInvalid('phone') ? 'border-red-500 focus:ring-red-500/20 focus:border-red-500 dark:border-rose-500/50 dark:focus:ring-rose-500/30' : 'border-slate-200 focus:ring-indigo-500/20 focus:border-indigo-500 dark:border-slate-700 dark:focus:ring-indigo-500/30 dark:focus:border-indigo-500'"
        class="w-full bg-slate-50 border rounded-xl py-2.5 px-4 text-sm focus:outline-none focus:ring-2 transition-all text-slate-700 placeholder-slate-400 dark:bg-slate-800 dark:text-slate-200 dark:placeholder-slate-500"
      />
    </div>
    @if (isInvalid('phone')) {
      <p class="text-xs text-red-500 mt-1">{{ 'clinics.phone_error' | translate }}</p>
    }
  </div>

  <!-- Availability Hours -->
  <div>
    <label for="availabilityHours" class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1.5">Availability Hours</label>
    <div class="relative">
      <input
        type="text"
        id="availabilityHours"
        formControlName="availabilityHours"
        placeholder="e.g. 09:00-17:00"
        [class]="isInvalid('availabilityHours') ? 'border-red-500 focus:ring-red-500/20 focus:border-red-500 dark:border-rose-500/50 dark:focus:ring-rose-500/30' : 'border-slate-200 focus:ring-indigo-500/20 focus:border-indigo-500 dark:border-slate-700 dark:focus:ring-indigo-500/30 dark:focus:border-indigo-500'"
        class="w-full bg-slate-50 border rounded-xl py-2.5 px-4 text-sm focus:outline-none focus:ring-2 transition-all text-slate-700 placeholder-slate-400 dark:bg-slate-800 dark:text-slate-200 dark:placeholder-slate-500"
      />
    </div>
    @if (isInvalid('availabilityHours')) {
      <p class="text-xs text-red-500 mt-1">Availability hours are required</p>
    }
  </div>

  <!-- Availability Days -->
  <div>
    <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1.5">Availability Days</label>
    <div class="flex flex-wrap gap-1.5">
      <button *ngFor="let day of ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday']"
              type="button"
              (click)="toggleDay(day)"
              class="px-3 py-1.5 text-xs font-bold rounded-lg border transition-all cursor-pointer"
              [ngClass]="selectedDays.includes(day)
                ? 'bg-indigo-600 text-white border-indigo-600'
                : 'bg-white dark:bg-slate-800 text-slate-550 dark:text-slate-400 border-slate-200 dark:border-slate-700 hover:border-indigo-300 hover:text-indigo-600'"
      >
        {{ day.substring(0, 3) }}
      </button>
    </div>
  </div>

  <!-- Form Actions -->
  <div class="flex items-center justify-end gap-3 pt-4 border-t border-slate-100 dark:border-slate-800">
    <button
      type="button"
      (click)="onCancel()"
      class="px-5 py-2.5 border border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-300 bg-white dark:bg-slate-800 rounded-xl text-sm font-semibold hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors focus:outline-none"
    >
      {{ 'common.cancel' | translate }}
    </button>
    <button
      type="submit"
      [disabled]="submitting"
      class="px-5 py-2.5 bg-indigo-600 dark:bg-indigo-550 text-white rounded-xl text-sm font-semibold hover:bg-indigo-700 dark:hover:bg-indigo-600 transition-colors shadow-sm shadow-indigo-500/20 dark:shadow-indigo-900/20 focus:outline-none focus:ring-2 focus:ring-indigo-500/40 dark:focus:ring-indigo-500/30 disabled:opacity-50 disabled:cursor-not-allowed"
    >
      {{ (submitting ? 'clinics.saving' : 'clinics.save_clinic') | translate }}
    </button>
  </div>
</form>
