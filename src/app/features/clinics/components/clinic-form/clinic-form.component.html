<form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-5">
  <!-- Clinic Name -->
  <div>
    <label for="name" class="block text-sm font-semibold text-slate-700 mb-1.5">Clinic Name</label>
    <div class="relative">
      <input
        type="text"
        id="name"
        formControlName="name"
        placeholder="e.g. Westside Family Care"
        [class]="isInvalid('name') ? 'border-red-500 focus:ring-red-500/20 focus:border-red-500' : 'border-slate-200 focus:ring-indigo-500/20 focus:border-indigo-500'"
        class="w-full bg-slate-50 border rounded-xl py-2.5 px-4 text-sm focus:outline-none focus:ring-2 transition-all text-slate-700 placeholder-slate-400"
      />
    </div>
    @if (isInvalid('name')) {
      <p class="text-xs text-red-500 mt-1">Name is required and must be at least 3 characters long.</p>
    }
  </div>

  <!-- Address -->
  <div>
    <label for="address" class="block text-sm font-semibold text-slate-700 mb-1.5">Address</label>
    <div class="relative">
      <input
        type="text"
        id="address"
        formControlName="address"
        placeholder="e.g. 123 Main St, New York, NY"
        [class]="isInvalid('address') ? 'border-red-500 focus:ring-red-500/20 focus:border-red-500' : 'border-slate-200 focus:ring-indigo-500/20 focus:border-indigo-500'"
        class="w-full bg-slate-50 border rounded-xl py-2.5 px-4 text-sm focus:outline-none focus:ring-2 transition-all text-slate-700 placeholder-slate-400"
      />
    </div>
    @if (isInvalid('address')) {
      <p class="text-xs text-red-500 mt-1">Address is required and must be at least 5 characters long.</p>
    }
  </div>

  <!-- Phone -->
  <div>
    <label for="phone" class="block text-sm font-semibold text-slate-700 mb-1.5">Phone Number</label>
    <div class="relative">
      <input
        type="text"
        id="phone"
        formControlName="phone"
        placeholder="e.g. +1 (555) 123-4567"
        [class]="isInvalid('phone') ? 'border-red-500 focus:ring-red-500/20 focus:border-red-500' : 'border-slate-200 focus:ring-indigo-500/20 focus:border-indigo-500'"
        class="w-full bg-slate-50 border rounded-xl py-2.5 px-4 text-sm focus:outline-none focus:ring-2 transition-all text-slate-700 placeholder-slate-400"
      />
    </div>
    @if (isInvalid('phone')) {
      <p class="text-xs text-red-500 mt-1">A valid phone number is required.</p>
    }
  </div>

  <!-- Form Actions -->
  <div class="flex items-center justify-end gap-3 pt-4 border-t border-slate-100">
    <button
      type="button"
      (click)="onCancel()"
      class="px-5 py-2.5 border border-slate-200 text-slate-600 rounded-xl text-sm font-semibold hover:bg-slate-50 transition-colors focus:outline-none"
    >
      Cancel
    </button>
    <button
      type="submit"
      [disabled]="submitting"
      class="px-5 py-2.5 bg-indigo-600 text-white rounded-xl text-sm font-semibold hover:bg-indigo-700 transition-colors shadow-sm shadow-indigo-500/20 focus:outline-none focus:ring-2 focus:ring-indigo-500/40 disabled:opacity-50 disabled:cursor-not-allowed"
    >
      {{ submitting ? 'Saving...' : 'Save Clinic' }}
    </button>
  </div>
</form>
