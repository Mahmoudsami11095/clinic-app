<form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate class="space-y-6">

  <!-- Section 1: Financial Information -->
  <div>
    <h3 class="text-xs font-bold uppercase tracking-wider text-slate-400 mb-4 flex items-center gap-2">
      <span class="w-5 h-5 bg-indigo-100 text-indigo-600 rounded-full flex items-center justify-center text-[10px] font-bold">1</span>
      Invoice Details
    </h3>

    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
      <!-- Patient Select -->
      <div class="sm:col-span-2">
        <label class="block text-sm font-semibold text-slate-700 mb-1.5" for="patientId">
          Patient <span class="text-rose-500">*</span>
        </label>
        <select
          id="patientId"
          formControlName="patientId"
          class="w-full rounded-xl border py-2.5 px-4 text-sm transition-all outline-none appearance-none bg-no-repeat custom-select"
          [ngClass]="isInvalid('patientId')
            ? 'border-rose-400 bg-rose-50 focus:ring-2 focus:ring-rose-500/20'
            : 'border-slate-200 bg-slate-50 focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-400'"
        >
          <option value="" disabled>Select patient</option>
          @for (p of patients; track p.id) {
            <option [value]="p.id">{{ p.firstName }} {{ p.lastName }}</option>
          }
        </select>
      </div>

      <!-- Amount -->
      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-1.5" for="amount">
          Amount ($) <span class="text-rose-500">*</span>
        </label>
        <div class="relative">
          <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-sm font-bold">$</span>
          <input
            id="amount"
            type="number"
            formControlName="amount"
            placeholder="0.00"
            step="0.01"
            class="w-full rounded-xl border py-2.5 pl-8 pr-4 text-sm transition-all outline-none font-bold text-slate-700"
            [ngClass]="isInvalid('amount')
              ? 'border-rose-400 bg-rose-50 focus:ring-2 focus:ring-rose-500/20'
              : 'border-slate-200 bg-slate-50 focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-400'"
          />
        </div>
      </div>

      <!-- Date Issued -->
      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-1.5" for="dateIssued">
          Issue Date <span class="text-rose-500">*</span>
        </label>
        <input
          id="dateIssued"
          type="date"
          formControlName="dateIssued"
          class="w-full rounded-xl border py-2.5 px-4 text-sm transition-all outline-none"
          [ngClass]="isInvalid('dateIssued')
            ? 'border-rose-400 bg-rose-50 focus:ring-2 focus:ring-rose-500/20'
            : 'border-slate-200 bg-slate-50 focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-400'"
        />
      </div>
    </div>
  </div>

  <!-- Section 2: Payment Status -->
  <div class="pt-4 border-t border-slate-100">
    <h3 class="text-xs font-bold uppercase tracking-wider text-slate-400 mb-4 flex items-center gap-2">
      <span class="w-5 h-5 bg-indigo-100 text-indigo-600 rounded-full flex items-center justify-center text-[10px] font-bold">2</span>
      Status & Method
    </h3>

    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
      <!-- Status -->
      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-1.5" for="status">
          Payment Status <span class="text-rose-500">*</span>
        </label>
        <select
          id="status"
          formControlName="status"
          class="w-full rounded-xl border py-2.5 px-4 text-sm transition-all outline-none appearance-none bg-no-repeat custom-select"
          [ngClass]="isInvalid('status')
            ? 'border-rose-400 bg-rose-50 focus:ring-2 focus:ring-rose-500/20'
            : 'border-slate-200 bg-slate-50 focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-400'"
        >
          @for (status of statusOptions; track status) {
            <option [value]="status">{{ status | titlecase }}</option>
          }
        </select>
      </div>

      <!-- Payment Method -->
      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-1.5" for="paymentMethod">
          Payment Method <span class="text-rose-500">*</span>
        </label>
        <select
          id="paymentMethod"
          formControlName="paymentMethod"
          class="w-full rounded-xl border py-2.5 px-4 text-sm transition-all outline-none appearance-none bg-no-repeat custom-select"
          [ngClass]="isInvalid('paymentMethod')
            ? 'border-rose-400 bg-rose-50 focus:ring-2 focus:ring-rose-500/20'
            : 'border-slate-200 bg-slate-50 focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-400'"
        >
          @for (method of paymentMethods; track method) {
            <option [value]="method">{{ method }}</option>
          }
        </select>
      </div>
    </div>
  </div>

  <!-- Description -->
  <div class="pt-4 border-t border-slate-100">
    <label class="block text-sm font-semibold text-slate-700 mb-1.5" for="description">
      Bill Description <span class="text-rose-500">*</span>
    </label>
    <textarea
      id="description"
      formControlName="description"
      rows="3"
      placeholder="e.g. Consultataion and Lab tests fees"
      class="w-full rounded-xl border py-2.5 px-4 text-sm transition-all border-slate-200 bg-slate-50 focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-400 outline-none resize-none"
    ></textarea>
  </div>

  <!-- Footer Actions -->
  <div class="flex items-center justify-end gap-3 pt-6 border-t border-slate-100">
    <button
      type="button"
      (click)="onCancel()"
      class="px-5 py-2.5 rounded-xl text-sm font-semibold text-slate-600 bg-slate-100 hover:bg-slate-200 transition-colors"
    >
      Cancel
    </button>
    <button
      type="submit"
      [disabled]="submitting"
      class="inline-flex items-center gap-2 px-6 py-2.5 bg-indigo-600 text-white rounded-xl text-sm font-semibold hover:bg-indigo-700 disabled:opacity-60 disabled:cursor-not-allowed transition-all shadow-sm shadow-indigo-500/20 focus:outline-none focus:ring-2 focus:ring-indigo-500/40"
    >
      @if (submitting) {
        <i class="pi pi-spin pi-spinner text-xs"></i>
        Creating...
      } @else {
        <i class="pi pi-receipt text-xs"></i>
        Create Invoice
      }
    </button>
  </div>
</form>
