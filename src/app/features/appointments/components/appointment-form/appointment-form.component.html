<form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate class="space-y-6">

  <!-- Section 1: Participants -->
  <div>
    <h3 class="text-xs font-bold uppercase tracking-wider text-slate-400 mb-4 flex items-center gap-2">
      <span class="w-5 h-5 bg-indigo-100 text-indigo-600 rounded-full flex items-center justify-center text-[10px] font-bold">1</span>
      Appointment Participants
    </h3>

    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
      <!-- Patient Select -->
      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-1.5" for="patientId">
          Patient <span class="text-rose-500">*</span>
        </label>
        <select
          id="patientId"
          formControlName="patientId"
          class="w-full rounded-xl border py-2.5 px-4 text-sm transition-all outline-none appearance-none bg-no-repeat custom-select"
          [ngClass]="isInvalid('patientId')
            ? 'border-rose-400 bg-rose-50 focus:ring-2 focus:ring-rose-500/20'
            : 'border-slate-200 bg-slate-50 focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-400'"
        >
          <option value="" disabled>Select patient</option>
          @for (p of patients; track p.id) {
            <option [value]="p.id">{{ p.firstName }} {{ p.lastName }}</option>
          }
        </select>
        @if (isInvalid('patientId')) {
          <p class="mt-1 text-xs text-rose-600">Patient is required</p>
        }
      </div>

      <!-- Doctor Select -->
      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-1.5" for="doctorId">
          Doctor <span class="text-rose-500">*</span>
        </label>
        <select
          id="doctorId"
          formControlName="doctorId"
          class="w-full rounded-xl border py-2.5 px-4 text-sm transition-all outline-none appearance-none bg-no-repeat custom-select"
          [ngClass]="isInvalid('doctorId')
            ? 'border-rose-400 bg-rose-50 focus:ring-2 focus:ring-rose-500/20'
            : 'border-slate-200 bg-slate-50 focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-400'"
        >
          <option value="" disabled>Select doctor</option>
          @for (d of doctors; track d.id) {
            <option [value]="d.id">Dr. {{ d.firstName }} {{ d.lastName }} ({{ d.specialization }})</option>
          }
        </select>
        @if (isInvalid('doctorId')) {
          <p class="mt-1 text-xs text-rose-600">Doctor is required</p>
        }
      </div>
    </div>
  </div>

  <!-- Section 2: Schedule -->
  <div class="pt-4 border-t border-slate-100">
    <h3 class="text-xs font-bold uppercase tracking-wider text-slate-400 mb-4 flex items-center gap-2">
      <span class="w-5 h-5 bg-indigo-100 text-indigo-600 rounded-full flex items-center justify-center text-[10px] font-bold">2</span>
      Date & Time
    </h3>

    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
      <!-- Date -->
      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-1.5" for="date">
          Date <span class="text-rose-500">*</span>
        </label>
        <input
          id="date"
          type="date"
          formControlName="date"
          class="w-full rounded-xl border py-2.5 px-4 text-sm transition-all outline-none"
          [ngClass]="isInvalid('date')
            ? 'border-rose-400 bg-rose-50 focus:ring-2 focus:ring-rose-500/20'
            : 'border-slate-200 bg-slate-50 focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-400'"
        />
      </div>

      <!-- Time -->
      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-1.5" for="time">
          Time <span class="text-rose-500">*</span>
        </label>
        <input
          id="time"
          type="time"
          formControlName="time"
          class="w-full rounded-xl border py-2.5 px-4 text-sm transition-all outline-none"
          [ngClass]="isInvalid('time')
            ? 'border-rose-400 bg-rose-50 focus:ring-2 focus:ring-rose-500/20'
            : 'border-slate-200 bg-slate-50 focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-400'"
        />
      </div>

      <!-- Type -->
      <div class="sm:col-span-2 lg:col-span-1">
        <label class="block text-sm font-semibold text-slate-700 mb-1.5" for="type">
          Visit Type <span class="text-rose-500">*</span>
        </label>
        <select
          id="type"
          formControlName="type"
          class="w-full rounded-xl border py-2.5 px-4 text-sm transition-all outline-none appearance-none bg-no-repeat custom-select"
          [ngClass]="isInvalid('type')
            ? 'border-rose-400 bg-rose-50 focus:ring-2 focus:ring-rose-500/20'
            : 'border-slate-200 bg-slate-50 focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-400'"
        >
          <option value="" disabled>Select type</option>
          @for (type of appointmentTypes; track type) {
            <option [value]="type">{{ type }}</option>
          }
        </select>
      </div>
    </div>
  </div>

  <!-- Notes -->
  <div class="pt-4 border-t border-slate-100">
    <label class="block text-sm font-semibold text-slate-700 mb-1.5" for="notes">
      Notes (Optional)
    </label>
    <textarea
      id="notes"
      formControlName="notes"
      rows="3"
      class="w-full rounded-xl border py-2.5 px-4 text-sm transition-all border-slate-200 bg-slate-50 focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-400 outline-none resize-none"
      placeholder="Special instructions or reason for visit..."
    ></textarea>
  </div>

  <!-- Footer Actions -->
  <div class="flex items-center justify-end gap-3 pt-6 border-t border-slate-100">
    <button
      type="button"
      (click)="onCancel()"
      class="px-5 py-2.5 rounded-xl text-sm font-semibold text-slate-600 bg-slate-100 hover:bg-slate-200 transition-colors"
    >
      Cancel
    </button>
    <button
      type="submit"
      [disabled]="submitting"
      class="inline-flex items-center gap-2 px-6 py-2.5 bg-indigo-600 text-white rounded-xl text-sm font-semibold hover:bg-indigo-700 disabled:opacity-60 disabled:cursor-not-allowed transition-all shadow-sm shadow-indigo-500/20 focus:outline-none focus:ring-2 focus:ring-indigo-500/40"
    >
      @if (submitting) {
        <i class="pi pi-spin pi-spinner text-xs"></i>
        Scheduling...
      } @else {
        <i class="pi pi-calendar-plus text-xs"></i>
        Schedule Appointment
      }
    </button>
  </div>
</form>
